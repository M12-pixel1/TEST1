<!doctype html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Augimo Programa — Vadovo panele</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
    h1 { color: #1a1a2e; }
    h2 { color: #16213e; border-bottom: 2px solid #0f3460; padding-bottom: 6px; }
    #user-bar { padding: 10px 20px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
    #user-bar button { float: right; background: transparent; color: #e94560; border: 1px solid #e94560; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
    #auth-gate { max-width: 480px; margin: 60px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    #main-ui { max-width: 900px; margin: 0 auto; padding: 20px; }
    section { background: #fff; padding: 20px; margin: 16px 0; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .signal-card { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 6px; }
    .critical { border-left: 4px solid #e94560; background: #fff5f5; }
    .warning { border-left: 4px solid #f5a623; background: #fffdf5; }
    .norm { border-left: 4px solid #999; }
    .btn-primary { padding: 10px 20px; background: #0f3460; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    a.nav-link { display: inline-block; margin-top: 10px; color: #0f3460; }
  </style>
</head>
<body>

<div id="user-bar" style="display:none;">
  <span id="user-info"></span>
  <button id="logout-btn">Atsijungti</button>
</div>

<div id="auth-gate">
  <h2>Vadovo panele</h2>
  <p>Prisijunk kaip vadovas. <a href="/">Grizti i prisijungima</a></p>
</div>

<div id="main-ui" style="display:none;">
  <h1>Vadovo panele</h1>

  <section>
    <h2>Komandos signalai</h2>
    <button class="btn-primary" id="refresh-btn">Atnaujinti</button>
    <div id="team-signals"><p>Kraunama...</p></div>
  </section>

  <section>
    <h2>Sistemos trukumai (System Fault)</h2>
    <div id="system-faults"><p>Kraunama...</p></div>
  </section>

  <a class="nav-link" href="/">&larr; Grizti i mokymasi</a>
</div>

<script src="/js/api-client.js"></script>
<script src="/js/auth-ui.js"></script>
<script>
async function loadTeam() {
  var c = document.getElementById('team-signals');
  c.innerHTML = '<p>Kraunama...</p>';
  try {
    var data = await window.api.getTeamSignals();
    if (!data.signals || data.signals.length === 0) {
      c.innerHTML = '<p>Komandoje nera aktyviu signalu.</p>'; return;
    }
    var h = '';
    for (var i = 0; i < data.signals.length; i++) {
      var s = data.signals[i];
      h += '<div class="signal-card ' + s.severity + '">' +
           '<strong>' + s.signalType + '</strong> (' + s.severity + ')<br>' +
           'Stiprumas: ' + (s.strength*100).toFixed(0) + '%, Pasitikejimas: ' + (s.confidence*100).toFixed(0) + '%<br>' +
           'Rekomenduojamas veiksmas: ' + s.recommendedAction + '</div>';
    }
    c.innerHTML = h;
  } catch(e) {
    if (e.message && e.message.indexOf('Manager role required') !== -1) {
      c.innerHTML = '<div style="padding:20px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;margin:10px 0;">' +
        '<strong>Neturite prieigos.</strong><br>' +
        'Si panele prieinama tik vadovams. Prisijunkite vadovo paskyra arba kreipkites i administratoriu.' +
        '</div>';
    } else {
      c.innerHTML = '<p style="color:red">Klaida: ' + e.message + '</p>';
    }
  }
}

async function loadFaults() {
  var c = document.getElementById('system-faults');
  try {
    var data = await window.api.getSystemFaults();
    if (!data.faults || data.faults.length === 0) {
      c.innerHTML = '<p>Sistemos trukumu neaptikta.</p>'; return;
    }
    var h = '';
    for (var i = 0; i < data.faults.length; i++) {
      var f = data.faults[i];
      h += '<div class="signal-card critical"><strong>Task: ' + f.taskId + '</strong><br>' +
           'Paveikti vartotojai: ' + f.affectedUsers + ' (' + (f.stuckRatio*100).toFixed(0) + '%)<br>' +
           'Veiksmas: ' + f.recommendedAction + '</div>';
    }
    c.innerHTML = h;
  } catch(e) { c.innerHTML = '<p>Nera prieigos arba tuscia (' + e.message + ')</p>'; }
}

document.addEventListener('DOMContentLoaded', function() {
  if (window.api.isAuthenticated) {
    var user = window.api.currentUser;
    if (user && user.role !== 'manager' && user.role !== 'admin') {
      document.getElementById('team-signals').innerHTML =
        '<div style="padding:20px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;">' +
        '<strong>Neturite prieigos.</strong><br>' +
        'Jus prisijunges kaip <b>' + user.role + '</b>. Si panele prieinama tik vadovams.<br><br>' +
        'Prisijunkite vadovo paskyra:<br>' +
        'El. pastas: <code>vadovas@augimo.lt</code><br>' +
        'Slaptazodis: <code>vadovas123</code>' +
        '</div>';
      document.getElementById('system-faults').innerHTML = '';
      return;
    }
    loadTeam(); loadFaults();
  }
  var rb = document.getElementById('refresh-btn');
  if (rb) rb.addEventListener('click', function() { loadTeam(); loadFaults(); });
});
</script>
</body>
</html>
